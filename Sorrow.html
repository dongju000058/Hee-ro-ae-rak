<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哀: The Dark Ritual of Breath</title>
    <style>
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-5@1.0/Paperlogy-Medium.woff2') format('woff2');
        }

        :root {
            --bg-dark: #0a141a; 
            --sorrow-glow: #6a8ba1;
            --text-main: #d1e0e9;
            --accent-dim: rgba(106, 139, 161, 0.2);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Paperlogy', sans-serif;
            overflow: hidden; user-select: none;
            transition: background 2s ease;
            cursor: none; /* 커스텀 커서 사용을 위해 기본 커서 숨김 */
        }

        /* 미니멀한 푸른빛 핀포인트 점 커서 (가독성을 위해 기본 크기를 8px로 살짝 키웠습니다) */
        #custom-cursor {
            position: fixed; width: 8px; height: 8px; background: var(--sorrow-glow); border-radius: 50%; pointer-events: none; z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s, border 0.3s;
            box-shadow: 0 0 8px var(--sorrow-glow);
        }
        #custom-cursor.hovered { width: 32px; height: 32px; background: transparent; border: 1px solid var(--sorrow-glow); box-shadow: none; }

        .back-nav {
            position: fixed; top: 30px; left: 30px;
            z-index: 12000;
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px;
            color: var(--text-main); text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0.6;
            cursor: none;
        }
        .back-nav:hover { transform: translateX(-5px); opacity: 1; }

        .container {
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1.5s ease;
            background: radial-gradient(circle at center, #1a2a35 0%, var(--bg-dark) 70%);
        }

        #fading-sorrow {
            max-width: 600px; text-align: center;
            font-size: 20px; font-weight: 300; color: var(--text-main);
            margin-bottom: 50px; line-height: 1.8;
            transition: all 1.5s ease;
            text-shadow: 0 0 15px rgba(106, 139, 161, 0.5);
            font-family: 'Paperlogy', sans-serif;
        }

        .breath-wrapper {
            position: relative; width: 350px; height: 350px;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }

        .timer-svg { position: absolute; transform: rotate(-90deg); filter: blur(1px); }
        .timer-bg { fill: none; stroke: var(--accent-dim); stroke-width: 2; }
        .timer-bar {
            fill: none; stroke: var(--sorrow-glow); stroke-width: 3;
            stroke-dasharray: 942; stroke-dashoffset: 942;
            stroke-linecap: round; transition: stroke-dashoffset 0.1s linear;
            filter: drop-shadow(0 0 5px var(--sorrow-glow));
        }

        .breath-circle {
            width: 160px; height: 160px;
            background-color: var(--sorrow-glow);
            border-radius: 50%; opacity: 0.2;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 40px rgba(106, 139, 161, 0.1);
            cursor: none;
        }

        .status-text, .time-display { color: white; font-family: 'Paperlogy', sans-serif; pointer-events: none; }
        .status-text { font-size: 15px; font-weight: 300; margin-bottom: 5px; opacity: 0.8; }
        .time-display { font-size: 28px; font-weight: 100; }

        .instruction {
            margin-top: 50px; color: var(--text-main);
            font-size: 16px; font-weight: 100; letter-spacing: 2px;
            transition: opacity 0.5s ease;
            opacity: 0.5; font-family: 'Paperlogy', sans-serif;
        }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050a0d;
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-content { width: 420px; text-align: center; padding: 20px; }
        .modal-content h2 { font-weight: 100; color: var(--text-main); margin-bottom: 35px; letter-spacing: 1px; font-family: 'Paperlogy', sans-serif; }
        textarea {
            width: 100%; height: 160px; padding: 25px; border-radius: 5px;
            border: 1px solid #1a2a35; background: #0d1a21;
            color: white; font-family: 'Paperlogy', sans-serif; font-size: 15px; 
            outline: none; resize: none; box-sizing: border-box;
            transition: border 0.3s ease;
            cursor: none;
        }
        textarea:focus { border-color: var(--sorrow-glow); }
        .btn-start {
            margin-top: 35px; padding: 14px 50px; border-radius: 2px;
            border: 1px solid var(--sorrow-glow); background: transparent; 
            color: var(--sorrow-glow); font-size: 14px; cursor: none; 
            transition: all 0.4s ease; letter-spacing: 2px;
            font-family: 'Paperlogy', sans-serif;
        }
        .btn-start:hover { background: var(--sorrow-glow); color: var(--bg-dark); }

        .progress-dots { margin-top: 40px; display: flex; gap: 15px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--sorrow-glow); opacity: 0.1; }
        .dot.active { opacity: 1; transform: scale(1.5); box-shadow: 0 0 10px var(--sorrow-glow); }

        #final-purify {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: radial-gradient(circle, #2a4a5a 0%, #050a0d 100%);
            opacity:0; pointer-events:none; transition: opacity 4s ease; z-index: 11000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="final-purify"></div>

    <div id="custom-cursor"></div>

    <!-- 홈 화면 파일명에 맞춰 경로 수정 가능 (예: index.html 등) -->
    <a href="Home.html" class="back-nav">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>무거운 마음을<br>잠시 기록해두세요.</h2>
            <textarea id="sorrow-input" placeholder="이곳에 남겨진 슬픔은 숨결과 함께 흩어집니다."></textarea>
            <button class="btn-start" onclick="submitSorrow()">기록 완료</button>
        </div>
    </div>

    <main id="main-container" class="container">
        <div id="fading-sorrow"></div>
        
        <div id="breath-area" class="breath-wrapper">
            <svg class="timer-svg" width="320" height="320">
                <circle class="timer-bg" cx="160" cy="160" r="150"></circle>
                <circle id="timer-bar" class="timer-bar" cx="160" cy="160" r="150"></circle>
            </svg>
            <div id="circle" class="breath-circle">
                <div id="status" class="status-text">준비</div>
                <div id="timer-num" class="time-display">●</div>
            </div>
        </div>

        <div id="instruction" class="instruction">원을 꾹 눌러 숨을 들이마십니다.</div>

        <div id="dot-area" class="progress-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </main>

    <script>
        const modal = document.getElementById('modal');
        const mainContainer = document.getElementById('main-container');
        const fadingSorrow = document.getElementById('fading-sorrow');
        const circle = document.getElementById('circle');
        const timerBar = document.getElementById('timer-bar');
        const statusText = document.getElementById('status');
        const timerNum = document.getElementById('timer-num');
        const instruction = document.getElementById('instruction');
        const dots = document.querySelectorAll('.dot');
        const finalPurify = document.getElementById('final-purify');
        const breathArea = document.getElementById('breath-area');
        const dotArea = document.getElementById('dot-area');
        const cursor = document.getElementById('custom-cursor');

        let step = 0; 
        let timer = 0;
        let cycleCount = 0;
        let interval = null;
        let isFinished = false;

        const config = [
            { label: "들이마셔요", time: 4, scale: 1.8, bg: "radial-gradient(circle at center, #2a4a5a 0%, #0a141a 100%)" },
            { label: "멈춰요", time: 4, scale: 1.8, bg: "radial-gradient(circle at center, #233a46 0%, #0a141a 100%)" },
            { label: "내뱉어요", time: 8, scale: 1.0, bg: "radial-gradient(circle at center, #142129 0%, #0a141a 100%)" }
        ];

        // 마우스 실시간 추적 트래킹
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 인터랙션 요소 호버 시 커서 이펙트 제어
        function initCursorHoverEvents() {
            const targets = document.querySelectorAll('.back-nav, .btn-start, textarea, .breath-circle');
            targets.forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
            });
        }

        function submitSorrow() {
            const text = document.getElementById('sorrow-input').value;
            if(!text.trim()) { alert("마음을 적어주세요."); return; }
            fadingSorrow.innerText = `"${text}"`;
            modal.style.display = 'none';
            mainContainer.style.opacity = '1';
            
            cursor.classList.remove('hovered');
            initCursorHoverEvents();
        }

        function startBreathing() {
            if (interval || isFinished || modal.style.display === 'flex') return;
            instruction.style.opacity = "0.1";
            runStep();
            
            interval = setInterval(() => {
                timer++;
                updateUI();
                
                if (timer >= config[step].time) {
                    timer = 0;
                    step++;
                    if (step > 2) {
                        step = 0;
                        cycleCount++;
                        updateDots();
                        updateTextOpacity(); 
                    }
                    if (cycleCount >= 3) finish();
                    else runStep();
                }
            }, 1000);
        }

        function stopBreathing() {
            if (isFinished) return;
            clearInterval(interval);
            interval = null;
            resetUI();
        }

        function runStep() {
            const current = config[step];
            statusText.innerText = current.label;
            circle.style.transform = `scale(${current.scale})`;
            circle.style.opacity = step === 2 ? "0.1" : "0.5";
            document.body.style.background = current.bg;
        }

        function updateUI() {
            const current = config[step];
            const remaining = current.time - timer;
            timerNum.innerText = remaining;
            const progress = timer / current.time;
            timerBar.style.strokeDashoffset = 942 - (progress * 942);
        }

        function updateDots() {
            dots.forEach((dot, idx) => { if (idx < cycleCount) dot.classList.add('active'); });
        }

        function updateTextOpacity() {
            const opacityLevel = 0.6 - (cycleCount * 0.2);
            fadingSorrow.style.opacity = Math.max(opacityLevel, 0);
            fadingSorrow.style.filter = `blur(${cycleCount * 3}px)`;
        }

        function resetUI() {
            step = 0; timer = 0;
            timerBar.style.strokeDashoffset = 942;
            circle.style.transform = "scale(1.0)";
            circle.style.opacity = "0.2";
            statusText.innerText = "준비";
            timerNum.innerText = "●";
            document.body.style.background = "radial-gradient(circle at center, #1a2a35 0%, #0a141a 100%)";
            instruction.style.opacity = "0.5";
            instruction.innerText = "원을 꾹 눌러 숨을 들이마십니다.";
        }

        // 호흡 3세션 완료 - 최종 피날레 연출 단계
        function finish() {
            isFinished = true;
            if (interval) {
                clearInterval(interval);
                interval = null;
            }
            fadingSorrow.style.opacity = "0";
            breathArea.style.opacity = "0";
            dotArea.style.opacity = "0";
            instruction.innerText = "슬픔이 고요함 속으로 흩어졌습니다.";
            instruction.style.opacity = "0.4";
            finalPurify.style.opacity = "1";
            
            // [수정 포인트] 커스텀 커서 레이어만 투명하게 지운 뒤, 본래 마우스 기본 화살표를 다시 노출시킵니다.
            cursor.style.opacity = "0";
            document.body.style.cursor = "default";
            html.style.cursor = "default";
        }

        mainContainer.addEventListener('mousedown', startBreathing);
        mainContainer.addEventListener('mouseup', stopBreathing);
        mainContainer.addEventListener('mouseleave', stopBreathing); 
        mainContainer.addEventListener('touchstart', (e) => { e.preventDefault(); startBreathing(); });
        mainContainer.addEventListener('touchend', stopBreathing);

        initCursorHoverEvents();


        // =======================================================
        // ⏳ 미활동 제어: 5분간 조작 없으면 메인 인트로(Home.html) 리셋
        // =======================================================
        (function() {
            const RESET_TIMEOUT = 5 * 60 * 1000; 
            const INTRO_PAGE_URL = "index.html";   
            let inactivityTimer = null;

            function resetInactivityTimer() {
                if (inactivityTimer) {
                    clearTimeout(inactivityTimer);
                }
                
                inactivityTimer = setTimeout(() => {
                    if (interval) {
                        clearInterval(interval);
                    }
                    window.location.href = INTRO_PAGE_URL;
                }, RESET_TIMEOUT);
            }

            const interactionEvents = ['mousemove', 'mousedown', 'click', 'keypress', 'touchstart', 'touchmove'];

            interactionEvents.forEach(eventType => {
                window.addEventListener(eventType, resetInactivityTimer, { passive: true });
            });

            resetInactivityTimer();
        })();
    </script>
</body>
</html>
